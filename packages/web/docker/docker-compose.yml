name: docai-web

services:
  web:
    build:
      context: ../../..
      dockerfile: packages/web/docker/Dockerfile
    env_file: ../../../.env
    environment:
      API_PROXY_TARGET: http://host.docker.internal:8080
    ports:
      - "5173:5173"
    volumes:
      - ../../..:/app
      - node_modules:/app/node_modules
    working_dir: /app

volumes:
  node_modules:
