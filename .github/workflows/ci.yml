name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        workspace: ["@docai/cli", "@docai/functions"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint --workspace=${{ matrix.workspace }}

      - name: Format check
        run: npm run format:check --workspace=${{ matrix.workspace }}

      - name: Build
        run: npm run build --workspace=${{ matrix.workspace }}

      - name: Test with coverage
        run: npm run test:coverage --workspace=${{ matrix.workspace }}

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  pr-size:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(gh pr view ${{ github.event.pull_request.number }} --json additions --jq '.additions')
          echo "PR additions: $ADDITIONS"
          if [ "$ADDITIONS" -gt 500 ]; then
            echo "::warning::PR が 500 行を超えています（${ADDITIONS} 行）。分割を検討してください。"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
