language: ja

reviews:
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "packages/api/src/**"
      instructions: |
        全レイヤー共通のレビュー観点:
        - セキュリティ: ユーザー入力のバリデーション漏れ、シークレットや API キーのハードコードがないか
        - エラーハンドリング: 外部 API 呼び出し・ファイル I/O に適切なエラー処理があるか
        - デッドコード: 未使用の変数・関数・import が残っていないか
        - テスト: 変更されたコードに対応するテストが追加・更新されているか

    - path: "packages/api/src/domain/**"
      instructions: |
        ドメイン層です。外部依存（ファイルI/O、API呼び出し、環境変数）を持たないこと。
        純粋な関数・クラスで構成されていることを確認してください。

    - path: "packages/api/src/application/**"
      instructions: |
        アプリケーション層です。ドメイン層のインターフェースを通じてロジックを組み立てます。
        インフラ層を直接importしていないことを確認してください。

    - path: "packages/api/src/infrastructure/**"
      instructions: |
        インフラ層です。外部API・ファイルI/O等の具体的な実装を配置します。
        ドメイン層で定義されたインターフェースを実装していることを確認してください。

  tools:
    eslint:
      enabled: true

chat:
  auto_reply: true
