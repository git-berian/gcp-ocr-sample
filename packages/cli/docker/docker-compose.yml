services:
  ocr:
    build:
      context: ../../..
      dockerfile: packages/cli/docker/Dockerfile
    env_file: ../../../.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/sa.json
    volumes:
      - ../../..:/app
      - node_modules:/app/node_modules
    working_dir: /app

volumes:
  node_modules:
